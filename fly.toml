# fly.toml app configuration file for sober-bot (Telegram webhook bot)
app = 'sober-bot'
primary_region = 'nrt'

[env]
  TZ = "Asia/Ho_Chi_Minh"

[build]

[processes]
  app = "python main.py"

[deploy]
  strategy = "immediate"

# Expose port 8080 để Telegram gửi webhook trực tiếp đến PTB Tornado server
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
